version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16

    container_name: chatbot_postgres

    restart: always

    environment:
      POSTGRES_USER: priyansh
      POSTGRES_PASSWORD: Priyansh@25
      POSTGRES_DB: chatbot_db

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U priyansh -d chatbot_db"]
      interval: 5s
      timeout: 5s
      retries: 5


  redis:
    image: redis:7

    container_name: chatbot_redis

    restart: always

    ports:
      - "6379:6379"

    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 5s
      retries: 5


  backend:

    build: .

    container_name: chatbot_backend

    restart: always

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:

      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    volumes:
      - .:/app

    command: bash start.sh


  worker:

    build: .

    container_name: chatbot_worker

    restart: always

    env_file:
      - .env

    depends_on:

      postgres:
        condition: service_healthy

      redis:
        condition: service_healthy

    volumes:
      - .:/app

    command: uv run celery -A app.worker.celery_app worker --loglevel=info


volumes:

  postgres_data: